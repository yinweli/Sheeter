name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ubuntu-latest | go 1.25.x
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
          cache: true
      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
